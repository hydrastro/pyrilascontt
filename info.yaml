project:
  title: "PyrilAscon AEAD128 TinyTapeout"
  author: "hydrastro"
  discord: ""
  description: "Minimum-area TinyTapeout ASCON-AEAD128 core: single 320-bit state, 5-bit column-serial permutation, hardcoded FSM, no side-channel/fault extras"
  language: "SystemVerilog"
  clock_hz: 10000000
  tiles: "2x4"
  top_module: "tt_um_hydrastro_pyrilascon"
  source_files:
    - "project.v"
    - "ascon/tt_ascon_core.sv"
    - "ascon/tt_ascon_perm.sv"
    - "ascon/tt_ascon_sbox5.sv"
    - "ascon/tt_ascon_pad.sv"

pinout:
  ui[0]: "data_in[0]"
  ui[1]: "data_in[1]"
  ui[2]: "data_in[2]"
  ui[3]: "data_in[3]"
  ui[4]: "data_in[4]"
  ui[5]: "data_in[5]"
  ui[6]: "data_in[6]"
  ui[7]: "data_in[7]"

  uo[0]: "data_out[0]"
  uo[1]: "data_out[1]"
  uo[2]: "data_out[2]"
  uo[3]: "data_out[3]"
  uo[4]: "data_out[4]"
  uo[5]: "data_out[5]"
  uo[6]: "data_out[6]"
  uo[7]: "data_out[7]"

  uio[0]: "ready"
  uio[1]: "done"
  uio[2]: "tag_ok"
  uio[3]: "busy"
  uio[4]: "cmd[0]"
  uio[5]: "cmd[1]"
  uio[6]: "cmd[2]"
  uio[7]: "cmd[3]"

yaml_version: 6
