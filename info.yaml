project:
  title: "PyrilAscon AEAD128 TinyTapeout"
  author: "hydrastro"
  discord: ""
  description: "TinyTapeout-oriented Ascon-AEAD128 serial ASIC core"
  language: "SystemVerilog"
  clock_hz: 10000000
  tiles: "6x2"
  top_module: "tt_um_hydrastro_pyrilascon"
  source_files:
    - "project.v"
    - "ascon/tt_ascon_ctrl.sv"
    - "ascon/tt_ascon_state.sv"
    - "ascon/tt_ascon_perm.sv"
    - "ascon/tt_ascon_engine.sv"
    - "ascon/tt_ascon_pad.sv"
    - "ascon/tt_ascon_sec.sv"
    - "ascon/tt_ascon_ptbuf.sv"
    - "ascon/tt_ascon_core.sv"

pinout:
  ui[0]: "data_in[0]"
  ui[1]: "data_in[1]"
  ui[2]: "data_in[2]"
  ui[3]: "data_in[3]"
  ui[4]: "data_in[4]"
  ui[5]: "data_in[5]"
  ui[6]: "data_in[6]"
  ui[7]: "start/data_in[7]"

  uo[0]: "data_out[0]"
  uo[1]: "data_out[1]"
  uo[2]: "data_out[2]"
  uo[3]: "data_out[3]"
  uo[4]: "data_out[4]"
  uo[5]: "data_out[5]"
  uo[6]: "data_out[6]"
  uo[7]: "data_out[7]"

  uio[0]: "ready"
  uio[1]: "done"
  uio[2]: "data_hi[0]"
  uio[3]: "data_hi[1]"
  uio[4]: "data_hi[2]"
  uio[5]: "data_hi[3]"
  uio[6]: "data_hi[4]"
  uio[7]: "data_hi[5]"

yaml_version: 6
